# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # ADDED: Step to set up Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ADDED: Step to install dependencies
      - name: Install dependencies
        run: npm install

      # ADDED: Step to build your project
      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # FIXED: Point to the 'build' or 'dist' folder created by your build step
          # Most React projects use 'build'. If yours uses 'dist', change this to 'dist'.
          path: './build' 
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
